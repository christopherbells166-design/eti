<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Etisalat Webmail</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #47080f;
    font-family: Arial, Helvetica, sans-serif;
}

/* CENTERING */
.wrapper {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN BOX */
.box {
    width: 400px;
    min-height: 250px;
    background: #efefef;
    border: 1px solid #7a7a7a;
    padding: 14px 15px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* LOGO */
.logo img {
    display: block;
    height: 80px;
    margin-top: -22px;
    margin-bottom: 4px;
}

/* TITLE */
.title {
    font-size: 18px;
    font-weight: bold;
    margin: 0 0 12px 0;
}

/* TABLE */
table {
    border-collapse: collapse;
    width: 100%;
}

/* LABEL COLUMN (ultra-tight gap) */
td.label {
    width: 85px;
    font-size: 12px;
    padding: 8px 0;
    text-align: right;
    padding-right: 4px;
}

/* INPUT COLUMN */
td.input {
    padding: 4px 0;
}

/* INPUT FIELDS */
input {
    width: 290px;
    height: 17px;
    border: 1px solid #5f5f5f;
    font-size: 13px;
    padding: 1px 4px;
}

/* ACTION ROW */
.actions {
    margin-top: 14px;
    margin-left: 75px;
    width: 310px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BUTTON */
button {
    background: #5a0a12;
    color: #fff;
    border: 1px solid #2d2d2d;
    font-size: 12px;
    padding: 2px 10px;
    cursor: pointer;
    margin-left: 22px;
}

/* DROPDOWN */
select {
    width: 135px;
    height: 21px;
    border: 1px solid #777;
    background: #e5e5e5;
    font-size: 12px;
    margin-left: 15px;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 11px;
    margin-top: 10px;
}

/* ERROR MESSAGE */
.error-message {
    color: red;
    font-size: 12px;
    margin-top: 10px;
    margin-left: 75px;
    display: none;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="box">

    <div>
        <!-- LOGO -->
        <div class="logo">
            <img src="https://1000logos.net/wp-content/uploads/2020/09/Etisalat-Logo-2022.png">
        </div>

        <!-- TITLE -->
        <div class="title">
            My Email - Etisalat by e&amp; Internet Mail
        </div>

        <form id="loginForm">
            <table>
                <tr>
                    <td class="label">Username:</td>
                    <td class="input"><input type="text" id="username" name="username" required></td>
                </tr>
                <tr>
                    <td class="label">Password:</td>
                    <td class="input"><input type="password" id="password" name="password" required></td>
                </tr>
            </table>

            <!-- ERROR MESSAGE -->
            <div class="error-message" id="errorMsg"></div>

            <!-- ACTIONS -->
            <div class="actions">
                <button type="button" id="loginBtn">Sign In</button>
                <select id="languageSelect">
                    <option>English</option>
                </select>
            </div>
        </form>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Copyright © 2023, Etisalat by e&amp;. All Rights Reserved.
    </div>

</div>
</div>
